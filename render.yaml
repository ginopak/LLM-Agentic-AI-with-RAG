# Render Blueprint — connect repo, set env vars in the dashboard (do not commit secrets).
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: wise-help-agent
    runtime: docker
    dockerfilePath: ./Dockerfile.web
    healthCheckPath: /health
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: SITE_API_TOKEN
        sync: false
      - key: BASIC_AUTH_USER
        sync: false
      - key: BASIC_AUTH_HASH
        sync: false
      - key: EMB_API_KEY
        sync: false
      - key: LLM_API_URL
        sync: false
      - key: LLM_MODEL
        sync: false
